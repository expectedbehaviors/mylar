{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecrets.target.name | default "mylar-config-bootstrap" }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .Values.externalSecrets.target.name | default "mylar-config-bootstrap" }}
    creationPolicy: {{ .Values.externalSecrets.target.creationPolicy | default "Owner" }}
  data:
    - secretKey: MYLAR_HTTP_USERNAME
      remoteRef:
        key: {{ .Values.externalSecrets.refs.httpUsername.key | quote }}
        property: {{ .Values.externalSecrets.refs.httpUsername.property | quote }}
    - secretKey: MYLAR_HTTP_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.refs.httpPassword.key | quote }}
        property: {{ .Values.externalSecrets.refs.httpPassword.property | quote }}
    - secretKey: MYLAR_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.refs.apiKey.key | quote }}
        property: {{ .Values.externalSecrets.refs.apiKey.property | quote }}
{{- end }}
---
{{- if .Values.configIni.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.configIni.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  refreshInterval: {{ .Values.configIni.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.configIni.secretStoreRef.name }}
    kind: {{ .Values.configIni.secretStoreRef.kind }}
  target:
    name: {{ .Values.configIni.secretName }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.ini: |
{{- $apiKey := print "{{" " .api_key " "}}" }}
{{- $comicvineApi := print "{{" " .comicvine_api " "}}" }}
{{- $httpUser := print "{{" " .http_username " "}}" }}
{{- $httpPass := print "{{" " .http_password " "}}" }}
{{- $q := "\"" }}
{{- $t := include "mylarConfigIniContent" . }}
{{- $t = $t | replace "__API_KEY__" (print $q $apiKey $q) }}
{{- $t = $t | replace "__COMICVINE_API__" (print $q $comicvineApi $q) }}
{{- $t = $t | replace "__HTTP_USERNAME__" (print $q $httpUser $q) }}
{{- $t = $t | replace "__HTTP_PASSWORD__" (print $q $httpPass $q) }}
{{ $t | nindent 10 }}
  data:
    - secretKey: api_key
      remoteRef:
        key: {{ .Values.configIni.secretRefs.apiKey.key | quote }}
        property: {{ .Values.configIni.secretRefs.apiKey.property | quote }}
    - secretKey: comicvine_api
      remoteRef:
        key: {{ .Values.configIni.secretRefs.comicvineApi.key | quote }}
        property: {{ .Values.configIni.secretRefs.comicvineApi.property | quote }}
{{- if and .Values.configIni.secretRefs (index .Values.configIni.secretRefs "httpUsername") }}
    - secretKey: http_username
      remoteRef:
        key: {{ .Values.configIni.secretRefs.httpUsername.key | quote }}
        property: {{ .Values.configIni.secretRefs.httpUsername.property | quote }}
{{- end }}
{{- if and .Values.configIni.secretRefs (index .Values.configIni.secretRefs "httpPassword") }}
    - secretKey: http_password
      remoteRef:
        key: {{ .Values.configIni.secretRefs.httpPassword.key | quote }}
        property: {{ .Values.configIni.secretRefs.httpPassword.property | quote }}
{{- end }}
{{- end }}

